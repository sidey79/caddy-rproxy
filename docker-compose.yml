name: caddy-rproxy

services:
  caddy:
    image: caddy:2.11.2@sha256:1e40b251ca9639ead7b5cd2cedcc8765adfbabb99450fe23f130eefabf50f4bc
    depends_on:
      fetch-workflow-assets:
        condition: service_completed_successfully
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./site:/srv
      - /opt/docker/caddy/data:/data
      - /opt/docker/caddy/caddy_config:/config
      - /opt/docker/rootca/root-ca.cert.pem:/etc/ssl/ca/certs/blausee_ca.crt:ro
      - /opt/docker/rootca/intermediate/caddy-intermediate.crt.pem:/etc/ssl/ca/certs/caddy-intermediate.crt
      - /opt/docker/rootca/intermediate/caddy-intermediate.key.pem:/etc/ssl/ca/private/caddy-intermediate.key
    environment:
      CADDY_SUBDOMAIN: $CADDY_SUBDOMAIN
      CADDY_SUBDOMAIN2: $CADDY_SUBDOMAIN2
      CADDY_SUBDOMAIN3: $CADDY_SUBDOMAIN3
      CADDY_ADMIN_USER: $CADDY_ADMIN_USER
      CADDY_ADMIN_PASSWORD: $CADDY_ADMIN_PASSWORD
      TELEGRAM_WEBHOOK_SECRET: $TELEGRAM_WEBHOOK_SECRET
    networks:
      backend_net:
      homelan:
        ipv4_address: 10.2.11.19
        ipv6_address: fd00:10:2:11::19
    restart: unless-stopped
    user: 5100:5100
    cap_add:
      - NET_ADMIN

  fetch-workflow-assets:
    image: curlimages/curl:8.18.0@sha256:d94d07ba9e7d6de898b6d96c1a072f6f8266c687af78a74f380087a0addf5d17
    volumes:
      - ./site:/target
      - ./scripts:/scripts:ro
    environment:
      GITHUB_TOKEN: $GITHUB_TOKEN
      GITHUB_ASSET_REF: ${GITHUB_ASSET_REF:-main}
    command: ["sh", "/scripts/fetch-workflow-assets.sh"]
    restart: "no"
    user: "0:0"

networks:
  backend_net:
    external: true
    name: network_backend_net
  homelan:
    external: true
    name: network_homelan
